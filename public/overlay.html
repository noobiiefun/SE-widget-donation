<!DOCTYPE html>
<!-- 
  SE Alert Bridge — OBS Overlay
  ================================
  Tambahkan ke OBS sebagai Browser Source:
  URL: http://localhost:3000/overlay
  Width: 1920, Height: 1080
  ✅ Transparan, tidak perlu ngrok!
-->
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: transparent !important;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}

#wrap {
  position: fixed;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
  z-index: 999;
}

#wrap.bottom-right  { bottom: 30px; right: 30px;  align-items: flex-end; }
#wrap.bottom-left   { bottom: 30px; left: 30px;   align-items: flex-start; }
#wrap.top-right     { top: 30px;    right: 30px;  align-items: flex-end; }
#wrap.top-left      { top: 30px;    left: 30px;   align-items: flex-start; }
#wrap.bottom-center { bottom: 30px; left: 50%;    transform: translateX(-50%); align-items: center; }
#wrap.top-center    { top: 30px;    left: 50%;    transform: translateX(-50%); align-items: center; }

.card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px 18px;
  border-radius: 14px;
  min-width: 360px;
  max-width: 500px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.07);
  animation: slideIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.card.out { animation: slideOut 0.35s ease-in forwards; }

.card.saweria    { background: rgba(18,12,4,0.94);  border-left: 4px solid #f5c842; }
.card.trakteer   { background: rgba(18,4,14,0.94);  border-left: 4px solid #e84393; }
.card.sociabuzz  { background: rgba(4,12,22,0.94);  border-left: 4px solid #4394e8; }
.card.streamlabs { background: rgba(4,18,8,0.94);   border-left: 4px solid #30e878; }
.card.custom     { background: rgba(14,10,22,0.94); border-left: 4px solid #9b8dff; }

.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 120px;
  opacity: 0.08; pointer-events: none;
}
.card.saweria::before    { background: radial-gradient(ellipse at left, #f5c842, transparent); }
.card.trakteer::before   { background: radial-gradient(ellipse at left, #e84393, transparent); }
.card.sociabuzz::before  { background: radial-gradient(ellipse at left, #4394e8, transparent); }
.card.streamlabs::before { background: radial-gradient(ellipse at left, #30e878, transparent); }
.card.custom::before     { background: radial-gradient(ellipse at left, #9b8dff, transparent); }

.icon-wrap {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.saweria    .icon-wrap { background: rgba(245,200,66,0.15); }
.trakteer   .icon-wrap { background: rgba(232,67,147,0.15); }
.sociabuzz  .icon-wrap { background: rgba(67,148,232,0.15); }
.streamlabs .icon-wrap { background: rgba(48,232,120,0.15); }
.custom     .icon-wrap { background: rgba(155,141,255,0.15); }

.avatar-img {
  width: 48px; height: 48px;
  border-radius: 50%; object-fit: cover;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.12);
}

.content { flex: 1; min-width: 0; }

.row-top {
  display: flex; align-items: center;
  justify-content: space-between;
  gap: 10px; margin-bottom: 4px;
}

.from-name {
  font-size: 17px; font-weight: 800;
  color: #fff;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 210px;
}

.amount {
  font-family: 'Courier New', monospace;
  font-size: 16px; font-weight: 600;
  white-space: nowrap; flex-shrink: 0;
}
.saweria    .amount { color: #f5c842; }
.trakteer   .amount { color: #e84393; }
.sociabuzz  .amount { color: #4394e8; }
.streamlabs .amount { color: #30e878; }
.custom     .amount { color: #9b8dff; }

.type-badge {
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.06);
  flex-shrink: 0;
}

.row-mid { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.unit-info { font-size: 11px; color: rgba(255,255,255,0.4); }

.message {
  font-size: 13px; color: rgba(255,255,255,0.7);
  line-height: 1.5; word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.bar {
  position: absolute; bottom: 0; left: 0;
  height: 3px; width: 100%; transition: width linear;
}
.saweria    .bar { background: #f5c842; }
.trakteer   .bar { background: #e84393; }
.sociabuzz  .bar { background: #4394e8; }
.streamlabs .bar { background: #30e878; }
.custom     .bar { background: #9b8dff; }

.particles {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden; border-radius: 14px;
}
.p {
  position: absolute;
  width: 6px; height: 6px; border-radius: 50%;
  opacity: 0; animation: pop 0.9s ease-out forwards;
}
@keyframes pop {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px) scale(0.9); }
  to   { opacity: 1; transform: none; }
}
@keyframes slideOut {
  from { opacity: 1; transform: none; }
  to   { opacity: 0; transform: translateX(56px) scale(0.88); }
}
</style>
</head>
<body>

<div id="wrap" class="bottom-right"></div>

<script>
// ✅ Connect langsung ke localhost — tidak perlu ngrok!
const SERVER_URL = 'http://localhost:3000';

let CFG = { duration: 6000, queue_delay: 1000, position: 'bottom-right', sound: true };

const PROV = {
  saweria:    { color: '#f5c842', icon: '💛', label: 'SAWERIA' },
  trakteer:   { color: '#e84393', icon: '🩷', label: 'TRAKTEER' },
  sociabuzz:  { color: '#4394e8', icon: '💙', label: 'SOCIABUZZ' },
  streamlabs: { color: '#30e878', icon: '🎮', label: 'STREAMLABS' },
  custom:     { color: '#9b8dff', icon: '🔔', label: 'ALERT' },
};

const TYPE_ICON  = { donation: null, follow: '👤', subscription: '⭐', resub: '⭐', bits: '💎', raid: '⚔️' };
const TYPE_LABEL = { donation: 'DONASI', follow: 'FOLLOW BARU', subscription: 'SUBSCRIBER', resub: 'RE-SUB', bits: 'BITS', raid: 'RAID' };

function fmt(amount, currency) {
  if (amount === null || amount === undefined || amount === '') return null;
  const n = parseFloat(amount);
  if (isNaN(n) || n === 0) return null;
  if (currency === 'IDR') {
    if (n >= 1000000) return 'Rp ' + (n/1000000).toFixed(1).replace('.0','') + 'jt';
    if (n >= 1000)    return 'Rp ' + Math.round(n/1000) + 'k';
    return 'Rp ' + n.toLocaleString('id-ID');
  }
  if (currency === 'bits') return n + ' bits';
  if (currency === 'USD')  return '$' + n.toFixed(2);
  return String(n);
}

function isBig(a, c) {
  if (!a) return false;
  return (c === 'IDR' && a >= 100000) || (c === 'USD' && a >= 10) || (c === 'bits' && a >= 500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const wrap = document.getElementById('wrap');
let queue = [], running = false;

function enqueue(a) { queue.push(a); if (!running) next(); }
function next() {
  if (!queue.length) { running = false; return; }
  running = true;
  show(queue.shift());
}

function show(alert) {
  const prov      = PROV[alert.provider] || PROV.custom;
  const typeIcon  = TYPE_ICON[alert.type] ?? prov.icon;
  const typeLabel = TYPE_LABEL[alert.type] || (alert.type||'ALERT').toUpperCase();
  const amtStr    = fmt(alert.amount, alert.currency);
  const big       = isBig(alert.amount, alert.currency);
  const cls       = PROV[alert.provider] ? alert.provider : 'custom';

  const card = document.createElement('div');
  card.className = 'card ' + cls;

  const iconHTML = alert.avatar
    ? `<img class="avatar-img" src="${esc(alert.avatar)}" onerror="this.outerHTML='<div class=icon-wrap>${typeIcon}</div>'" alt="">`
    : `<div class="icon-wrap">${typeIcon}</div>`;

  let unitHTML = '';
  if (alert.unit && alert.quantity) {
    unitHTML = `<span class="unit-info">${esc(alert.quantity)}× ${esc(alert.unit)}</span>`;
  }

  card.innerHTML = `
    ${iconHTML}
    <div class="content">
      <div class="row-top">
        <span class="from-name">${esc(alert.from)}</span>
        ${amtStr ? `<span class="amount">${amtStr}</span>` : `<span class="type-badge">${typeLabel}</span>`}
      </div>
      ${amtStr || unitHTML ? `<div class="row-mid"><span class="type-badge">${typeLabel}</span>${unitHTML}</div>` : ''}
      ${alert.message ? `<div class="message">${esc(alert.message)}</div>` : ''}
    </div>
    <div class="bar"></div>
    ${big ? '<div class="particles"></div>' : ''}
  `;

  wrap.insertBefore(card, wrap.firstChild);
  const all = wrap.querySelectorAll('.card');
  if (all.length > 3) all[all.length-1].remove();

  const bar = card.querySelector('.bar');
  bar.style.transition = `width ${CFG.duration}ms linear`;
  requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.width = '0%'; }));

  if (big) spawnParticles(card, prov.color);
  if (CFG.sound) beep(alert.type);

  setTimeout(() => {
    card.classList.add('out');
    setTimeout(() => { card.remove(); setTimeout(next, CFG.queue_delay); }, 380);
  }, CFG.duration);
}

function spawnParticles(card, color) {
  const ptc = card.querySelector('.particles');
  if (!ptc) return;
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    p.style.background = color;
    p.style.left = (30 + Math.random()*80) + 'px';
    p.style.top  = (40 + Math.random()*40) + 'px';
    const a = Math.random()*Math.PI*2, d = 35 + Math.random()*65;
    p.style.setProperty('--dx', Math.cos(a)*d + 'px');
    p.style.setProperty('--dy', Math.sin(a)*d + 'px');
    p.style.animationDelay = (Math.random()*0.25) + 's';
    ptc.appendChild(p);
  }
}

function beep(type) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const notes = { donation:[523,659], follow:[440,523], subscription:[523,659,784], bits:[659,784] };
    const seq = notes[type] || [523,659];
    gain.gain.setValueAtTime(0.28, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.65);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(seq[0], ctx.currentTime);
    if (seq[1]) osc.frequency.setValueAtTime(seq[1], ctx.currentTime+0.16);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.65);
  } catch {}
}

function applyConfig(cfg) {
  if (!cfg) return;
  if (cfg.duration)    CFG.duration    = cfg.duration;
  if (cfg.queue_delay) CFG.queue_delay = cfg.queue_delay;
  if (typeof cfg.sound !== 'undefined') CFG.sound = cfg.sound;
  if (cfg.position) { wrap.className = cfg.position; CFG.position = cfg.position; }
}

let retries = 0;
function connect() {
  const es = new EventSource(SERVER_URL + '/events');
  es.onopen = () => { retries = 0; };
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'CONFIG') { applyConfig(d.config); return; }
      if (d.type === 'connected' || d.type === 'ping') return;
      enqueue(d);
    } catch {}
  };
  es.onerror = () => {
    es.close(); retries++;
    setTimeout(connect, Math.min(2000 * retries, 15000));
  };
}

fetch(SERVER_URL + '/api/config')
  .then(r => r.json())
  .then(cfg => { if (cfg.overlay) applyConfig(cfg.overlay); connect(); })
  .catch(() => connect());
</script>
</body>
</html>
